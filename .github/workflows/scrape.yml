name: Scrape lunch menus

on:
  schedule:
    # Monday 07:30 UTC = 09:30 Europe/Stockholm (08:30 during winter).
    # Restaurants publish the full week on Monday, so one scrape per week is enough.
    - cron: "30 7 * * 1"
  workflow_dispatch:
    inputs:
      force_claude:
        description: "Force Claude-based extraction (skip selector parser)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --omit=dev || npm install --omit=dev

      - name: Scrape
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_CLAUDE: ${{ inputs.force_claude == 'true' && '1' || '' }}
        run: npm run scrape

      - name: Commit updated menus
        run: |
          git config user.name "lunchtime-bot"
          git config user.email "lunchtime-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No menu changes."
          else
            git commit -m "chore(data): scrape menus $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
